<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>予定追加</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>予定追加</h1>
    <a class="add-button" href="/">戻る</a>
</header>

<main>
    <form class="form-box" method="POST">
        <label>予定名</label>
        <input type="text" name="title" required>

        <label>日時</label>
        <input type="datetime-local" name="date" required>

        <h2 class="form-title">繰り返し設定</h2>

        <label>繰り返し</label>
        <select name="repeat_type">
            <option value="none">繰り返しなし</option>
            <option value="daily">毎日</option>
            <option value="weekly">毎週</option>
            <option value="monthly">毎月</option>
        </select>

        <label>毎週の場合：曜日</label>
        <select name="repeat_weekday">
            <option value="0">月曜日</option>
            <option value="1">火曜日</option>
            <option value="2">水曜日</option>
            <option value="3">木曜日</option>
            <option value="4">金曜日</option>
            <option value="5">土曜日</option>
            <option value="6">日曜日</option>
        </select>

        <label>毎月の場合：日付</label>
        <input type="number" name="repeat_month_day" min="1" max="31" value="1">

        <label>繰り返し終了日</label>
        <input type="date" name="repeat_end_date">

        <h2 class="form-title">通知設定</h2>

        <label>前日通知の時刻</label>
        <input type="time" name="notify_day_before">

        <label>何分前に通知するか</label>
        <input type="text" name="notify_minutes_before" placeholder="例：120,60,30,10">

        <p class="help-text">
            複数指定する場合はカンマで区切る。例：120,60,30,10
        </p>

        <label class="checkbox-label">
            <input type="checkbox" name="notify_at_time">
            開始時刻にも通知する
        </label>

        <button type="submit">保存</button>
    </form>
</main>

</body>
</html>
